name: OPVELIB → Snowflake RAW

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      OPVELIB_DOMAIN:   ${{ secrets.OPVELIB_DOMAIN }}
      OPVELIB_DATASET:  ${{ secrets.OPVELIB_DATASET }}
      OPVELIB_API_KEY:  ${{ secrets.OPVELIB_API_KEY }}
      SF_ACCOUNT:      ${{ secrets.SF_ACCOUNT }}
      SF_USER:         ${{ secrets.SF_USER }}
      SF_PASSWORD:     ${{ secrets.SF_PASSWORD }}
      SF_DATABASE:     ${{ secrets.SF_DATABASE }}
      SF_WAREHOUSE:    ${{ secrets.SF_WAREHOUSE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests snowflake-connector-python

      - run: python scripts/ingest_velib.py
      - run: python scripts/ingest_meteo.py
